<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JARVIS | Landing Core</title>
    <link rel="stylesheet" href="css/style.css?v=11">
    <link rel="stylesheet" href="css/animations.css?v=11">
</head>
<body class="landing-body">

    <canvas id="bgCanvas"></canvas>
    <div class="scanline"></div>

    <div class="landing-container glass-surface">
        <div class="landing-header">
            <div class="logo-large">J.A.R.V.I.S.</div>
            <div class="sub-logo">NEURAL ASSISTANT CORE</div>
        </div>

        <div class="reactor-pulse-landing">
            <div class="ring-pulse"></div>
            <div class="ring-pulse-inner"></div>
            <div class="core-glow-landing"></div>
        </div>

        <div class="landing-description">
            <p>Sir, the neural interface is online and waiting initialization. Please authenticate to establish secure neural link.</p>
        </div>

        <div class="landing-actions">
            <button class="launch-btn" id="btnInitialize">INITIALIZE SYSTEM LINK</button>
        </div>
        
        <div class="system-status-landing">
            <span class="pulse-green"></span> SECURE SHIELD ACTIVE
        </div>
    </div>

    <!-- Background stars and Canvas script -->
    <script src="js/ui.js?v=11"></script>
    <script>
        // Check auth status
        window.addEventListener('DOMContentLoaded', async () => {
            const token = localStorage.getItem('token');
            if (token) {
                try {
                    const res = await fetch('/api/auth/status', {
                        headers: { 'Authorization': `Bearer ${token}` }
                    });
                    const status = await res.json();
                    if (status.authenticated) {
                        window.location.href = 'dashboard.html';
                        return;
                    }
                } catch(e) {
                    console.error("Auth check failed:", e);
                }
            }
            
            document.getElementById('btnInitialize').addEventListener('click', () => {
                window.location.href = 'login.html';
            });
        });
    </script>
</body>
</html>
